version: "3.9"
services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mab}
      POSTGRES_DB: ${POSTGRES_DB:-mab_crm}
    ports:
      - "5432:5432"
    volumes:
      - mab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mab} -d ${POSTGRES_DB:-mab_crm}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  mab_pgdata:
